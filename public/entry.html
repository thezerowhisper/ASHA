<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>New entry — ASHA Register</title>
<link rel="stylesheet" href="/css/shared.css" />
</head>
<body>
<header class="app-header">
  <div class="brand">New entry</div>
  <button class="link" onclick="logout()">Log out</button>
</header>

<main>
  <div class="filter-bar" id="type-picker">
    <button data-type="pregnancy" class="active">Pregnancy</button>
    <button data-type="pregnancy_visit">ANC visit</button>
    <button data-type="birth">New birth</button>
    <button data-type="child_visit">Child visit</button>
    <button data-type="couple">Eligible couple</button>
  </div>

  <!-- New pregnancy -->
  <form id="form-pregnancy" class="card">
    <h3>Register a pregnancy</h3>
    <label for="p-name">Woman's name</label>
    <input id="p-name" required />
    <label for="p-husband">Husband's name</label>
    <input id="p-husband" />
    <label for="p-age">Age</label>
    <input id="p-age" type="number" min="10" max="60" />
    <label for="p-village">Village / area</label>
    <input id="p-village" />
    <label for="p-phone">Phone</label>
    <input id="p-phone" type="tel" />
    <label for="p-lmp">LMP date</label>
    <input id="p-lmp" type="date" />
    <label for="p-edd">EDD (if known, otherwise leave blank — we'll estimate)</label>
    <input id="p-edd" type="date" />
    <div class="checkbox-row">
      <input id="p-risk" type="checkbox" />
      <label for="p-risk">Flag as high-risk pregnancy</label>
    </div>
    <div id="p-risk-factors-wrap" style="display:none;">
      <label for="p-risk-factors">Risk factors (comma separated — e.g. anemia, hypertension, prev C-section)</label>
      <input id="p-risk-factors" />
    </div>
    <button class="primary" type="submit">Save pregnancy</button>
  </form>

  <!-- ANC visit -->
  <form id="form-pregnancy_visit" class="card" style="display:none;">
    <h3>Record an ANC visit</h3>
    <label for="pv-pregnancy">Search woman by name</label>
    <input id="pv-pregnancy" placeholder="Type to search active pregnancies…" />
    <div id="pv-results" style="margin-top:6px;"></div>
    <input type="hidden" id="pv-pregnancy-id" />
    <label for="pv-bp">Blood pressure</label>
    <input id="pv-bp" placeholder="e.g. 120/80" />
    <label for="pv-weight">Weight (kg)</label>
    <input id="pv-weight" type="number" step="0.1" />
    <label for="pv-hb">Hb (g/dL)</label>
    <input id="pv-hb" type="number" step="0.1" />
    <label for="pv-notes">Notes</label>
    <textarea id="pv-notes" rows="2"></textarea>
    <button class="primary" type="submit">Save visit</button>
  </form>

  <!-- New birth -->
  <form id="form-birth" class="card" style="display:none;">
    <h3>Register a new birth</h3>
    <label for="b-mother">Mother's name (search existing, optional)</label>
    <input id="b-mother" placeholder="Type to search…" />
    <div id="b-results" style="margin-top:6px;"></div>
    <input type="hidden" id="b-mother-id" />
    <label for="b-name">Baby's name (optional)</label>
    <input id="b-name" />
    <label for="b-dob">Date of birth</label>
    <input id="b-dob" type="date" required />
    <label for="b-gender">Gender</label>
    <select id="b-gender">
      <option value="">Select</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
    <label for="b-weight">Birth weight (kg)</label>
    <input id="b-weight" type="number" step="0.01" />
    <label for="b-village">Village / area</label>
    <input id="b-village" />
    <button class="primary" type="submit">Save birth</button>
  </form>

  <!-- Child visit -->
  <form id="form-child_visit" class="card" style="display:none;">
    <h3>Record a child visit</h3>
    <label for="cv-child">Search child by name</label>
    <input id="cv-child" placeholder="Type to search…" />
    <div id="cv-results" style="margin-top:6px;"></div>
    <input type="hidden" id="cv-child-id" />
    <label for="cv-weight">Weight (kg)</label>
    <input id="cv-weight" type="number" step="0.01" />
    <label for="cv-height">Height/length (cm)</label>
    <input id="cv-height" type="number" step="0.1" />
    <label for="cv-immunization">Immunization given</label>
    <input id="cv-immunization" placeholder="e.g. BCG, OPV-1, Penta-1" />
    <label for="cv-notes">Notes</label>
    <textarea id="cv-notes" rows="2"></textarea>
    <button class="primary" type="submit">Save visit</button>
  </form>

  <!-- Eligible couple -->
  <form id="form-couple" class="card" style="display:none;">
    <h3>Register an eligible couple</h3>
    <label for="c-husband">Husband's name</label>
    <input id="c-husband" required />
    <label for="c-wife">Wife's name</label>
    <input id="c-wife" required />
    <label for="c-husband-age">Husband's age</label>
    <input id="c-husband-age" type="number" min="15" max="80" />
    <label for="c-wife-age">Wife's age</label>
    <input id="c-wife-age" type="number" min="15" max="60" />
    <label for="c-marriage">Marriage date</label>
    <input id="c-marriage" type="date" />
    <label for="c-village">Village / area</label>
    <input id="c-village" />
    <label for="c-phone">Phone</label>
    <input id="c-phone" type="tel" />
    <label for="c-fp">Family planning method currently used</label>
    <select id="c-fp">
      <option value="none">None yet</option>
      <option value="condom">Condom</option>
      <option value="ocp">Oral pills (OCP)</option>
      <option value="iucd">IUCD</option>
      <option value="injectable">Injectable</option>
      <option value="sterilization_f">Female sterilization</option>
      <option value="sterilization_m">Male sterilization (NSV)</option>
      <option value="other">Other</option>
    </select>
    <label for="c-notes">Notes</label>
    <textarea id="c-notes" rows="2"></textarea>
    <button class="primary" type="submit">Save couple</button>
  </form>
</main>

<script src="/js/shared.js"></script>
<script>
  let me = null;

  document.querySelectorAll("#type-picker button").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#type-picker button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll("main form").forEach((f) => (f.style.display = "none"));
      document.getElementById(`form-${btn.dataset.type}`).style.display = "block";
    });
  });

  document.getElementById("p-risk").addEventListener("change", (e) => {
    document.getElementById("p-risk-factors-wrap").style.display = e.target.checked ? "block" : "none";
  });

  // --- Pregnancy ---
  document.getElementById("form-pregnancy").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError(e.target);
    try {
      await api("pregnancies", {
        method: "POST",
        body: {
          name: val("p-name"),
          husband_name: val("p-husband"),
          age: numVal("p-age"),
          village: val("p-village"),
          phone: val("p-phone"),
          lmp_date: val("p-lmp"),
          edd: val("p-edd"),
          is_high_risk: document.getElementById("p-risk").checked,
          risk_factors: val("p-risk-factors"),
        },
      });
      showToast("Pregnancy saved");
      e.target.reset();
      document.getElementById("p-risk-factors-wrap").style.display = "none";
    } catch (err) {
      showError(e.target, err.message);
    }
  });

  // --- ANC visit (with simple live search over active pregnancies) ---
  let pregnancyCache = [];
  document.getElementById("pv-pregnancy").addEventListener("input", async (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!pregnancyCache.length) pregnancyCache = await api("pregnancies?status=active");
    const matches = q ? pregnancyCache.filter((p) => p.woman_name.toLowerCase().includes(q)) : [];
    document.getElementById("pv-results").innerHTML = matches
      .slice(0, 5)
      .map((p) => `<div class="reg-row" style="cursor:pointer;" data-id="${p.id}" data-name="${p.woman_name}">${p.woman_name} — ${p.village || "no village"}</div>`)
      .join("");
    document.querySelectorAll("#pv-results .reg-row").forEach((row) => {
      row.addEventListener("click", () => {
        document.getElementById("pv-pregnancy").value = row.dataset.name;
        document.getElementById("pv-pregnancy-id").value = row.dataset.id;
        document.getElementById("pv-results").innerHTML = "";
      });
    });
  });

  document.getElementById("form-pregnancy_visit").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError(e.target);
    const id = document.getElementById("pv-pregnancy-id").value;
    if (!id) return showError(e.target, "Pick a woman from the search results first");
    try {
      await api("pregnancies", {
        method: "PATCH",
        body: {
          id: Number(id),
          visit: { bp: val("pv-bp"), weight: numVal("pv-weight"), hb: numVal("pv-hb"), notes: val("pv-notes") },
        },
      });
      showToast("Visit saved");
      e.target.reset();
      document.getElementById("pv-pregnancy-id").value = "";
    } catch (err) {
      showError(e.target, err.message);
    }
  });

  // --- New birth (search mothers among women with active/delivered pregnancies) ---
  document.getElementById("b-mother").addEventListener("input", async (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) return (document.getElementById("b-results").innerHTML = "");
    if (!pregnancyCache.length) pregnancyCache = await api("pregnancies?status=active");
    const matches = pregnancyCache.filter((p) => p.woman_name.toLowerCase().includes(q));
    document.getElementById("b-results").innerHTML = matches
      .slice(0, 5)
      .map((p) => `<div class="reg-row" style="cursor:pointer;" data-id="${p.woman_id}" data-name="${p.woman_name}">${p.woman_name} — ${p.village || "no village"}</div>`)
      .join("");
    document.querySelectorAll("#b-results .reg-row").forEach((row) => {
      row.addEventListener("click", () => {
        document.getElementById("b-mother").value = row.dataset.name;
        document.getElementById("b-mother-id").value = row.dataset.id;
        document.getElementById("b-results").innerHTML = "";
      });
    });
  });

  document.getElementById("form-birth").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError(e.target);
    try {
      await api("children", {
        method: "POST",
        body: {
          mother_id: document.getElementById("b-mother-id").value ? Number(document.getElementById("b-mother-id").value) : null,
          name: val("b-name"),
          dob: val("b-dob"),
          gender: val("b-gender"),
          birth_weight: numVal("b-weight"),
          village: val("b-village"),
        },
      });
      showToast("Birth recorded");
      e.target.reset();
      document.getElementById("b-mother-id").value = "";
    } catch (err) {
      showError(e.target, err.message);
    }
  });

  // --- Child visit ---
  let childCache = null;
  document.getElementById("cv-child").addEventListener("input", async (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!childCache) childCache = await api("children?max_age=5");
    const matches = q ? childCache.filter((c) => (c.name || "").toLowerCase().includes(q) || (c.mother_name || "").toLowerCase().includes(q)) : [];
    document.getElementById("cv-results").innerHTML = matches
      .slice(0, 5)
      .map((c) => `<div class="reg-row" style="cursor:pointer;" data-id="${c.id}" data-name="${c.name || "Unnamed"}">${c.name || "Unnamed baby"} (mother: ${c.mother_name || "—"})</div>`)
      .join("");
    document.querySelectorAll("#cv-results .reg-row").forEach((row) => {
      row.addEventListener("click", () => {
        document.getElementById("cv-child").value = row.dataset.name;
        document.getElementById("cv-child-id").value = row.dataset.id;
        document.getElementById("cv-results").innerHTML = "";
      });
    });
  });

  document.getElementById("form-child_visit").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError(e.target);
    const id = document.getElementById("cv-child-id").value;
    if (!id) return showError(e.target, "Pick a child from the search results first");
    try {
      await api("children", {
        method: "PATCH",
        body: {
          id: Number(id),
          visit: { weight: numVal("cv-weight"), height: numVal("cv-height"), immunization: val("cv-immunization"), notes: val("cv-notes") },
        },
      });
      showToast("Visit saved");
      e.target.reset();
      document.getElementById("cv-child-id").value = "";
    } catch (err) {
      showError(e.target, err.message);
    }
  });

  // --- Eligible couple ---
  document.getElementById("form-couple").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError(e.target);
    try {
      await api("couples", {
        method: "POST",
        body: {
          husband_name: val("c-husband"),
          wife_name: val("c-wife"),
          husband_age: numVal("c-husband-age"),
          wife_age: numVal("c-wife-age"),
          marriage_date: val("c-marriage"),
          village: val("c-village"),
          phone: val("c-phone"),
          fp_method: val("c-fp"),
          notes: val("c-notes"),
        },
      });
      showToast("Couple saved");
      e.target.reset();
    } catch (err) {
      showError(e.target, err.message);
    }
  });

  function val(id) {
    const v = document.getElementById(id).value;
    return v ? v.trim() : "";
  }
  function numVal(id) {
    const v = document.getElementById(id).value;
    return v ? Number(v) : null;
  }

  (async () => {
    me = await requireSession();
    if (!me) return;
    renderTabbar("entry");
  })();
</script>
</body>
</html>
